<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>입퇴주 관리 시스템 | STAGE9</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

    :root {
      --accent: #fb7c1e;
      --accent-dim: rgba(251,124,30,0.12);
      --accent-hover: #e86c0e;
      --bg: #0f0f0f;
      --bg-2: #181818;
      --bg-3: #222222;
      --border: rgba(255,255,255,0.08);
      --text: #ffffff;
      --text-muted: #888;
      --text-dim: #444;
      --green: #38a169;
      --red: #e53e3e;
      --blue: #6c8eff;
      --topbar: 54px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ─── LOGIN ─── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: rgba(24,24,24,0.9);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 52px 44px;
      width: 420px;
      max-width: 90vw;
      text-align: center;
      backdrop-filter: blur(24px);
    }
    .login-icon  { font-size: 52px; margin-bottom: 20px; }
    .login-brand { font-size: 11px; font-weight: 700; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
    .login-title { font-size: 22px; font-weight: 700; margin-bottom: 36px; }
    .login-input {
      width: 100%;
      background: #252525;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 15px;
      color: var(--text);
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .login-input::placeholder { color: var(--text-muted); }
    .login-input:focus { border-color: var(--accent); }
    .login-btn {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }
    .login-btn:hover { background: var(--accent-hover); }
    .login-error { color: var(--red); font-size: 13px; margin-top: 12px; display: none; }

    /* ─── TOP BAR ─── */
    #main-screen { display: none; }
    .top-bar {
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--topbar);
    }
    .top-brand { font-size: 10px; font-weight: 700; letter-spacing: 3px; color: var(--accent); }
    .top-title  { font-size: 15px; font-weight: 700; margin-top: 1px; }
    .logout-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 13px;
      border-radius: 7px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .logout-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── DASHBOARD ─── */
    .dashboard {
      display: grid;
      grid-template-columns: 210px 1fr;
      height: calc(100vh - var(--topbar));
    }

    /* ─── LEFT PANEL ─── */
    .left-panel {
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      position: sticky;
      top: var(--topbar);
      height: calc(100vh - var(--topbar));
    }
    .summary-stack { display: flex; flex-direction: column; gap: 8px; }
    .summary-card {
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 15px;
    }
    .summary-card.warn { border-color: rgba(251,124,30,0.3); background: rgba(251,124,30,0.05); }
    .summary-num { font-size: 28px; font-weight: 800; line-height: 1; margin-bottom: 5px; }
    .summary-num.c-green  { color: var(--green); }
    .summary-num.c-brown  { color: #dd6b20; }
    .summary-num.c-orange { color: var(--accent); }
    .summary-num.c-dim    { color: var(--text-dim); }
    .summary-label { font-size: 11px; color: var(--text-muted); }
    .panel-div { height: 1px; background: var(--border); margin: 2px 0; }
    .search-wrap {
      display: flex;
      align-items: center;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 11px;
      gap: 7px;
      transition: border-color 0.2s;
    }
    .search-wrap:focus-within { border-color: var(--accent); }
    .search-icon { color: var(--text-dim); font-size: 13px; flex-shrink: 0; }
    #search-input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 13px;
      padding: 9px 0;
      width: 100%;
      font-family: inherit;
    }
    #search-input::placeholder { color: var(--text-muted); }
    .month-nav-card {
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 13px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .mnav-title { font-size: 10px; font-weight: 700; color: var(--text-dim); letter-spacing: 0.5px; text-transform: uppercase; }
    .mnav-row { display: flex; align-items: center; justify-content: space-between; }
    .mnav-label { font-size: 14px; font-weight: 700; text-align: center; flex: 1; }
    .nav-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      padding: 0 3px;
      transition: color 0.15s;
      font-family: inherit;
    }
    .nav-btn:hover { color: var(--accent); }
    #month-picker {
      width: 100%;
      background: #252525;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-muted);
      font-size: 12px;
      padding: 7px 9px;
      outline: none;
      font-family: inherit;
      color-scheme: dark;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    #month-picker:hover, #month-picker:focus { border-color: var(--accent); color: var(--text); }
    .today-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 7px 0;
      font-size: 12px;
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: all 0.15s;
      font-family: inherit;
    }
    .today-btn:hover { border-color: var(--accent); color: var(--accent); }
    .menu-edit-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 9px 0;
      font-size: 12px;
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: all 0.15s;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .menu-edit-btn:hover { border-color: var(--accent); color: var(--accent); }

.csv-btn {
      background: transparent;
      border: 1px solid rgba(56,161,105,0.4);
      color: var(--green);
      border-radius: 8px;
      padding: 9px 0;
      font-size: 12px;
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: all 0.15s;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .csv-btn:hover { background: rgba(56,161,105,0.1); border-color: var(--green); }

    /* 바로가기 */
    /* 담당자 필터 */
    .assignee-filter-select {
      width: 100%;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 11px;
      font-size: 12px;
      color: var(--text-muted);
      outline: none;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.2s;
      color-scheme: dark;
    }
    .assignee-filter-select:hover,
    .assignee-filter-select:focus { border-color: var(--accent); color: var(--text); }
    .assignee-filter-select option { background: #252525; }
    .assignee-filter-select.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .shortcut-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .shortcut-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }
    .shortcut-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 4px 6px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text-muted);
      transition: all 0.15s;
      cursor: pointer;
    }
    .shortcut-item:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }
    .shortcut-icon { font-size: 17px; line-height: 1; }
    .shortcut-label {
      font-size: 9px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
      text-align: center;
      line-height: 1.3;
    }


    /* ─── RIGHT PANEL ─── */
    .right-panel { overflow-y: auto; padding: 20px 24px; }

    /* ─── MONTH SECTION ─── */
    .month-section { margin-bottom: 24px; }
    .month-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    .month-badge { font-size: 17px; font-weight: 800; transition: color 0.2s; }
    .month-header:hover .month-badge { color: var(--accent); }
    .month-tag { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
    .tag-prev { background: rgba(255,255,255,0.07); color: var(--text-muted); }
    .tag-cur  { background: var(--accent-dim); color: var(--accent); }
    .tag-nxt  { background: rgba(108,142,255,0.12); color: var(--blue); }
    .chevron { margin-left: auto; font-size: 13px; color: var(--text-muted); transition: transform 0.22s; }
    .chevron.open { transform: rotate(0deg); }
    .chevron.shut { transform: rotate(-90deg); }
    .month-header:hover .chevron { color: var(--accent); }
    .month-content { padding-top: 16px; }
    .month-content.collapsed { display: none; }
    .type-section { margin-bottom: 18px; }
    .type-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .type-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }
    .type-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .type-dot.in  { background: var(--accent); }
    .type-dot.out { background: var(--blue); }
    .add-btn {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(251,124,30,0.25);
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .add-btn:hover { background: var(--accent); color: white; }

    /* ─── TABLE ─── */
    .table-wrap { overflow-x: auto; }
    .company-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-2);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      min-width: 620px;
    }
    .company-table th {
      background: var(--bg-3);
      padding: 6px 10px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .company-table td {
      padding: 6px 10px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      vertical-align: middle;
    }
    .company-table tbody tr:hover td { background: rgba(255,255,255,0.015); }
    .company-name { font-weight: 600; white-space: nowrap; }
    .room-badge {
      font-size: 10px;
      color: rgba(255,255,255,0.75);
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 5px;
    }
    .office-move-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 5px;
      font-weight: 600;
      color: #7ecfe4;
      background: rgba(126,207,228,0.14);
    }
    .assignee-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 5px;
      font-weight: 600;
    }
    .cl-progress {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      padding: 3px 6px;
      border-radius: 5px;
      border: 1px solid var(--border);
      min-width: 40px;
      transition: all 0.15s;
      user-select: none;
    }
    .cl-progress:hover { border-color: var(--accent); background: var(--accent-dim); }
    .cl-progress.all-done { border-color: rgba(56,161,105,0.35); background: rgba(56,161,105,0.08); }
    .cl-frac { font-size: 11px; font-weight: 700; line-height: 1; }
    .cl-bar { width: 100%; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .cl-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.2s; }
    .cl-bar-fill.out { background: var(--blue); }
    .memo-text {
      font-size: 11px;
      color: var(--text-muted);
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .action-btns { display: flex; gap: 4px; }
    .action-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 2px 7px;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      white-space: nowrap;
    }
    .action-btn:hover { border-color: var(--accent); color: var(--accent); }
    .action-btn.del:hover { border-color: var(--red); color: var(--red); }
    .empty-row td {
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      padding: 18px;
    }

    /* ─── MODAL 공통 ─── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px;
      width: 480px;
      max-width: 92vw;
    }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 22px; }
    .form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { margin-bottom: 13px; }
    .form-label { font-size: 11px; color: var(--text-muted); font-weight: 600; display: block; margin-bottom: 5px; }
    .form-input, .form-select {
      width: 100%;
      background: #252525;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .form-input:focus, .form-select:focus { border-color: var(--accent); }
    .form-select option { background: #252525; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-save {
      background: var(--accent);
      color: white;
      border: none;
      padding: 9px 22px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }
    .btn-save:hover { background: var(--accent-hover); }

    /* ─── 체크리스트 모달 ─── */
    .cl-stage-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }
    .cl-stage-label.out-label { color: var(--blue); }

    /* 체크리스트 스크롤 영역 */
    .cl-scroll {
      max-height: 52vh;
      overflow-y: auto;
      margin: 0 -4px;
      padding: 0 4px;
    }

    .cl-item {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      padding: 9px 8px;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .cl-item:hover { background: rgba(255,255,255,0.04); }
    .cl-checkbox {
      width: 18px; height: 18px;
      border-radius: 4px;
      border: 1.5px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      margin-top: 1px;
      transition: all 0.15s;
    }
    .cl-checkbox.checked { background: var(--green); border-color: var(--green); color: white; }
    .cl-item-text { font-size: 13px; line-height: 1.5; flex: 1; }
    .cl-item-text.checked { color: var(--text-muted); text-decoration: line-through; }

    /* 기업 전용 커스텀 항목 */
    .cl-divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 4px 6px;
    }
    .cl-divider-line { flex: 1; height: 1px; background: var(--border); }
    .cl-divider-label { font-size: 10px; color: var(--text-dim); white-space: nowrap; }

    .cl-custom-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 9px 8px;
      border-radius: 7px;
    }
    .cl-custom-item:hover { background: rgba(255,255,255,0.04); }
    .cl-custom-checkbox-area {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      flex: 1;
      cursor: pointer;
    }
    .cl-custom-del {
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 15px;
      padding: 0 2px;
      flex-shrink: 0;
      align-self: center;
      transition: color 0.15s;
      line-height: 1;
    }
    .cl-custom-del:hover { color: var(--red); }

    /* 항목 추가 입력 */
    .cl-add-row {
      display: flex;
      gap: 7px;
      align-items: center;
      margin-top: 10px;
      padding: 0 4px;
    }
    .cl-new-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 11px;
      font-size: 13px;
      color: var(--text);
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .cl-new-input:focus { border-color: var(--accent); }
    .cl-new-input::placeholder { color: var(--text-dim); }
    .cl-add-confirm {
      background: var(--accent-dim);
      border: 1px solid rgba(251,124,30,0.3);
      color: var(--accent);
      padding: 8px 13px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .cl-add-confirm:hover { background: var(--accent); color: white; }

    .cl-empty { color: var(--text-muted); font-size: 13px; text-align: center; padding: 16px 0; }

    /* ─── 메뉴 수정 모달 ─── */
    .menu-modal-inner {
      width: 100%;
      max-height: 68vh;
      overflow-y: auto;
      padding-right: 4px;
    }
    .menu-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
    }
    .menu-tab {
      padding: 7px 16px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .menu-tab.active.in-tab  { background: var(--accent-dim); border-color: rgba(251,124,30,0.4); color: var(--accent); }
    .menu-tab.active.out-tab { background: rgba(108,142,255,0.12); border-color: rgba(108,142,255,0.4); color: var(--blue); }
    .menu-tab:not(.active):hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

    { text:'#38a169', bg:'rgba(56,161,105,0.14)' },
    { text:'#fb7c1e', bg:'rgba(251,124,30,0.14)' },
  ];
  function getStaffColor(staffList, staffId) {
    const idx = staffList.findIndex(s=>s.id===staffId);
    if (idx < 0) return null;
    return STAFF_COLORS[idx % STAFF_COLORS.length];
  }
  function getStaff() {
    try { return JSON.parse(localStorage.getItem('s9_staff')||'null') || JSON.parse(JSON.stringify(STAFF_DEFAULTS)); }
    catch { return JSON.parse(JSON.stringify(STAFF_DEFAULTS)); }
  }
  function setStaff(s) { localStorage.setItem('s9_staff', JSON.stringify(s)); }

  function initChecklists(type, isOfficeMove) {
    const t = isOfficeMove ? (type==='out' ? OFFICE_MOVE_OUT_DEFAULTS : OFFICE_MOVE_IN_DEFAULTS) : getTemplates(type);
    const cl = {};
    getStages(type).forEach(s => {
      cl[s.key] = {};
      (t[s.key]||[]).forEach(item => { cl[s.key][item.id] = false; });
    });
    return cl;
  }

  /* ─── 앱 상태 ─── */
  let editingId       = null;
  let editingStaff    = null;
  const collapseState = {};
  let selectedMonth      = todayYM();
  let searchQuery        = '';
  let filterAssignee     = '';
  const typeCollapseState = {};

  function todayYM() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }
  function getMonths() {
    const [y,m] = selectedMonth.split('-').map(Number), mi=m-1;
    const py=mi===0?y-1:y, pm=mi===0?11:mi-1;
    const ny=mi===11?y+1:y, nm=mi===11?0:mi+1;
    return [
      `${py}-${String(pm+1).padStart(2,'0')}`,
      selectedMonth,
      `${ny}-${String(nm+1).padStart(2,'0')}`,
    ];
  }
  function formatMonth(ym) { const [y,m]=ym.split('-'); return `${y}년 ${parseInt(m)}월`; }

  function getData() {
    try { return JSON.parse(localStorage.getItem('s9_companies')||'[]'); } catch { return []; }
  }
  function setData(d) { localStorage.setItem('s9_companies', JSON.stringify(d)); }
  function genId()    { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

  /* 커스텀 항목 포함 전체 진행률 계산 (기업별 삭제 항목 제외) */
  function getProgress(c, stageKey, templates) {
    const tmpl    = templates || getCompanyTemplates(c);
    const deleted = (c.deletedItems&&c.deletedItems[stageKey])||[];
    const items   = (tmpl[stageKey]||[]).filter(i=>!deleted.includes(i.id));
    const checks  = (c.checklists&&c.checklists[stageKey])||{};
    const custom  = (c.customItems&&c.customItems[stageKey])||[];
    const done  = items.filter(i=>checks[i.id]===true).length + custom.filter(i=>i.checked).length;
    const total = items.length + custom.length;
    return { done, total };
  }

  function isAllDone(c) {
    const t = getCompanyTemplates(c);
    return getStages(c.type||'in').every(s => {
      const deleted = (c.deletedItems&&c.deletedItems[s.key])||[];
      const items   = (t[s.key]||[]).filter(i=>!deleted.includes(i.id));
      const checks  = (c.checklists&&c.checklists[s.key])||{};
      const custom  = (c.customItems&&c.customItems[s.key])||[];
      const tmplDone = items.length > 0 && items.every(i => checks[i.id]===true);
      const custDone = custom.every(i => i.checked);
      return tmplDone && custDone;
    });
  }

  /* ─── Auth ─── */
  function doLogin() {
    if (document.getElementById('pw-input').value === PASSWORD) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main-screen').style.display  = 'block';
      initControls();
      render();
    } else {
      document.getElementById('pw-error').style.display = 'block';
    }
  }
  function doLogout() {
    document.getElementById('main-screen').style.display  = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-error').style.display = 'none';
  }
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key==='Enter') doLogin();
    document.getElementById('pw-error').style.display = 'none';
  });

  let _ready = false;
  function initControls() {
    if (_ready) return; _ready = true;
    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value.toLowerCase().trim();
      renderMonths();
    });
    document.getElementById('month-picker').addEventListener('change', e => {
      if (e.target.value) goToMonth(e.target.value);
    });
  }

  /* ─── Navigation ─── */
  function prevMonth() {
    const [y,m]=selectedMonth.split('-').map(Number),mi=m-1;
    goToMonth(`${mi===0?y-1:y}-${String(mi===0?12:mi).padStart(2,'0')}`);
  }
  function nextMonth() {
    const [y,m]=selectedMonth.split('-').map(Number),mi=m-1;
    goToMonth(`${mi===11?y+1:y}-${String(mi===11?1:mi+2).padStart(2,'0')}`);
  }
  function goToMonth(ym) { selectedMonth=ym; render(); }
  function goToToday()   { selectedMonth=todayYM(); render(); }
  function toggleCollapse(ym) { collapseState[ym]=!collapseState[ym]; renderMonths(); }
  function toggleTypeCollapse(ym, type) { typeCollapseState[ym+'_'+type]=!typeCollapseState[ym+'_'+type]; renderMonths(); }

  /* ─── Render ─── */
  function populateAssigneeFilter() {
    const sel = document.getElementById('assignee-filter');
    if (!sel) return;
    const staff = getStaff();
    const cur = sel.value;
    sel.innerHTML = `<option value="">👤 전체 담당자</option>` +
      staff.map(s=>`<option value="${escHtml(s.id)}"${cur===s.id?' selected':''}>${escHtml(s.name)}</option>`).join('');
    sel.className = 'assignee-filter-select' + (filterAssignee ? ' active' : '');
  }
  function setAssigneeFilter(id) {
    filterAssignee = id;
    const sel = document.getElementById('assignee-filter');
    if (sel) sel.className = 'assignee-filter-select' + (id ? ' active' : '');
    renderMonths();
    document.getElementById('summary-area').innerHTML = renderSummary(getData(), getMonths()[1]);
  }

  function render() {
    const [,cur] = getMonths();
    const companies = getData();
    document.getElementById('summary-area').innerHTML      = renderSummary(companies, cur);
    document.getElementById('month-nav-label').textContent = formatMonth(selectedMonth);
    document.getElementById('month-picker').value          = selectedMonth;
    populateAssigneeFilter();
    renderMonths(companies);
  }

  function renderMonths(companies) {
    if (!companies) companies = getData();
    const [prev,cur,nxt] = getMonths();
    document.getElementById('months-area').innerHTML =
      renderMonthSection(companies, prev, '전월', 'tag-prev') +
      renderMonthSection(companies, cur,  '당월', 'tag-cur') +
      renderMonthSection(companies, nxt,  '익월', 'tag-nxt');
  }

  function renderSummary(companies, cur) {
    const ml = `${parseInt(cur.split('-')[1])}월`;
    const curIn   = companies.filter(c=>c.month===cur&&c.type==='in').length;
    const curOut  = companies.filter(c=>c.month===cur&&c.type==='out').length;
    const delayed = companies.filter(c=>c.month<cur&&!isAllDone(c)).length;
    return `
      <div class="summary-stack">
        <div class="summary-card">
          <div class="summary-num c-green">${curIn}</div>
          <div class="summary-label">📥 ${ml} 입실 예정</div>
        </div>
        <div class="summary-card">
          <div class="summary-num c-brown">${curOut}</div>
          <div class="summary-label">📤 ${ml} 퇴실 예정</div>
        </div>
        <div class="summary-card${delayed>0?' warn':''}">
          <div class="summary-num ${delayed>0?'c-orange':'c-dim'}">${delayed}</div>
          <div class="summary-label">⚠️ 처리 지연</div>
        </div>
      </div>`;
  }

  function renderMonthSection(companies, ym, label, tagClass) {
    const q = searchQuery;
    const allIn  = companies.filter(c=>c.month===ym&&c.type==='in');
    const allOut = companies.filter(c=>c.month===ym&&c.type==='out');
    const inList  = allIn.filter(c=>
      (!q || c.name.toLowerCase().includes(q)) &&
      (!filterAssignee || c.assigneeId===filterAssignee)
    );
    const outList = allOut.filter(c=>
      (!q || c.name.toLowerCase().includes(q)) &&
      (!filterAssignee || c.assigneeId===filterAssignee)
    );
    const totalAll = allIn.length+allOut.length;
    const totalVis = inList.length+outList.length;
    const isFiltered = q || filterAssignee;
    const countStr = isFiltered ? `${totalVis}/${totalAll}건` : `${totalAll}건`;
    const shut = collapseState[ym]===true;
    return `
      <div class="month-section">
        <div class="month-header" onclick="toggleCollapse('${ym}')">
          <div class="month-badge">${formatMonth(ym)}</div>
          <div class="month-tag ${tagClass}">${label}</div>
          <span style="font-size:11px;color:var(--text-dim)">${countStr}</span>
          <div class="chevron ${shut?'shut':'open'}">▼</div>
        </div>
        <div class="month-content${shut?' collapsed':''}">
          ${['in','out'].map(t => {
            const list    = t==='in' ? inList : outList;
            const stages  = t==='in' ? IN_STAGES : OUT_STAGES;
            const label2  = t==='in' ? '입주 예정' : '퇴주 예정';
            const dotCls  = t==='in' ? 'in' : 'out';
            const tShut   = typeCollapseState[ym+'_'+t]===true;
            return `<div class="type-section">
              <div class="type-header" style="cursor:pointer;user-select:none;" onclick="toggleTypeCollapse('${ym}','${t}')">
                <div class="type-label">
                  <div class="type-dot ${dotCls}"></div>
                  ${label2}&nbsp;<span style="color:var(--text-dim)">${list.length}건</span>
                  <span style="font-size:9px;color:var(--text-dim);margin-left:4px;">${tShut?'▶':'▼'}</span>
                </div>
                <button class="add-btn" onclick="event.stopPropagation();openModal('${t}','${ym}')">+ 추가</button>
              </div>
              ${tShut ? '' : renderTable(list, stages, t)}
            </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  function renderTable(list, stages, type) {
    const isOut = type==='out';
    const headBg    = isOut ? 'rgba(108,142,255,0.15)' : 'rgba(251,124,30,0.13)';
    const headColor = isOut ? 'var(--blue)' : 'var(--accent)';
    const heads = `<th style="background:${headBg};color:${headColor};">기업명</th>${stages.map(s=>`<th style="background:${headBg};color:${headColor};">${escHtml(s.label)}</th>`).join('')}<th style="background:${headBg};color:${headColor};">메모</th><th style="background:${headBg};"></th>`;
    if (!list.length) return `
      <div class="table-wrap"><table class="company-table">
        <thead><tr>${heads}</tr></thead>
        <tbody><tr class="empty-row"><td colspan="${stages.length+3}">등록된 기업이 없습니다</td></tr></tbody>
      </table></div>`;

    const staff = getStaff();

    const rows = list.map(c => {
      const stageCols = stages.map(s => {
        const { done: doneCount, total } = getProgress(c, s.key);
        const allDone = total > 0 && doneCount === total;
        const pct = total > 0 ? Math.round(doneCount/total*100) : 0;
        const fracColor = allDone ? 'var(--green)' : doneCount>0 ? (isOut?'var(--blue)':'var(--accent)') : 'var(--text-dim)';
        return `<td>
          <div class="cl-progress${allDone?' all-done':''}" onclick="openChecklistModal('${c.id}','${s.key}')">
            <div class="cl-frac" style="color:${fracColor}">${allDone?'✅':doneCount+'/'+total}</div>
            ${total>0&&!allDone?`<div class="cl-bar"><div class="cl-bar-fill${isOut?' out':''}" style="width:${pct}%"></div></div>`:''}
          </div>
        </td>`;
      }).join('');
      const n=escHtml(c.name), r=escHtml(c.room||''), memo=escHtml(c.memo||'');
      const assigneeName = c.assigneeId ? escHtml((staff.find(s=>s.id===c.assigneeId)||{}).name||'') : '';
      const aColor = c.assigneeId ? getStaffColor(staff, c.assigneeId) : null;
      const aBadge = assigneeName && aColor
        ? `<span class="assignee-badge" style="color:${aColor.text};background:${aColor.bg};">👤 ${assigneeName}</span>`
        : '';
      const omBadge = c.isOfficeMove ? `<span class="office-move-badge">🏢 오피스 이전</span>` : '';
      return `<tr>
        <td class="company-name">${n}${r?`<span class="room-badge">${r}</span>`:''}${omBadge}${aBadge}</td>
        ${stageCols}
        <td><div class="memo-text" title="${memo}">${memo||'—'}</div></td>
        <td><div class="action-btns">
          <button class="action-btn" onclick="openEdit('${c.id}')">수정</button>
          <button class="action-btn del" onclick="deleteCompany('${c.id}')">삭제</button>
        </div></td>
      </tr>`;
    }).join('');
    return `<div class="table-wrap"><table class="company-table"><thead><tr>${heads}</tr></thead><tbody>${rows}</tbody></table></div>`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ─── 체크리스트 모달 ─── */
  let clCompanyId = null;
  let clStageKey  = null;
  let clType      = null;

  function openChecklistModal(companyId, stageKey) {
    const data = getData();
    const company = data.find(c=>c.id===companyId);
    if (!company) return;
    clCompanyId = companyId;
    clStageKey  = stageKey;
    clType      = company.type||'in';
    const stage = getStages(clType).find(s=>s.key===stageKey);
    const labelEl = document.getElementById('cl-stage-label');
    labelEl.textContent = stage ? stage.label : stageKey;
    labelEl.className   = 'cl-stage-label' + (clType==='out'?' out-label':'');
    document.getElementById('cl-title').textContent = company.name;
    document.getElementById('cl-new-input').value = '';
    refreshClItems();
    document.getElementById('checklist-modal').classList.add('open');
  }

  function refreshClItems() {
    const data = getData();
    const company = data.find(c=>c.id===clCompanyId);
    if (!company) return;
    const templates = getCompanyTemplates(company);
    const allItems = templates[clStageKey]||[];
    const deleted  = (company.deletedItems&&company.deletedItems[clStageKey])||[];
    const items    = allItems.filter(i=>!deleted.includes(i.id));
    const checks   = (company.checklists&&company.checklists[clStageKey])||{};
    const custom   = (company.customItems&&company.customItems[clStageKey])||[];

    let html = '';

    /* 템플릿 항목 */
    if (items.length) {
      html += items.map(item => {
        const done = checks[item.id]===true;
        return `<div class="cl-custom-item">
          <div class="cl-custom-checkbox-area" onclick="toggleChecklistItem('${escHtml(item.id)}')">
            <div class="cl-checkbox${done?' checked':''}">${done?'✓':''}</div>
            <div class="cl-item-text${done?' checked':''}">${escHtml(item.text)}</div>
          </div>
          <button class="cl-teams-btn" onclick="event.stopPropagation();openTeamsForItem('${escHtml(item.id)}','template')" title="팀즈 일정 추가">📅 팀즈</button>
          <button class="cl-custom-del" onclick="deleteTemplateItem('${escHtml(item.id)}')" title="이 기업에서 삭제">×</button>
        </div>`;
      }).join('');
    } else if (!allItems.length) {
      html += '<div class="cl-empty" style="padding:12px 0 4px;">공통 항목이 없습니다.<br><span style="font-size:11px">메뉴 수정에서 추가하세요.</span></div>';
    }

    /* 기업 전용 커스텀 항목 */
    if (custom.length) {
      html += `<div class="cl-divider">
        <div class="cl-divider-line"></div>
        <div class="cl-divider-label">이 기업 전용 항목</div>
        <div class="cl-divider-line"></div>
      </div>`;
      html += custom.map(item => {
        const done = item.checked===true;
        return `<div class="cl-custom-item">
          <div class="cl-custom-checkbox-area" onclick="toggleCustomItem('${escHtml(item.id)}')">
            <div class="cl-checkbox${done?' checked':''}">${done?'✓':''}</div>
            <div class="cl-item-text${done?' checked':''}">${escHtml(item.text)}</div>
          </div>
          <button class="cl-teams-btn" onclick="event.stopPropagation();openTeamsForItem('${escHtml(item.id)}','custom')" title="팀즈 일정 추가">📅 팀즈</button>
          <button class="cl-custom-del" onclick="deleteCustomItem('${escHtml(item.id)}')" title="삭제">×</button>
        </div>`;
      }).join('');
    }

    document.getElementById('cl-items').innerHTML = html;
  }

  function toggleChecklistItem(itemId) {
    const data = getData();
    const company = data.find(c=>c.id===clCompanyId);
    if (!company) return;
    if (!company.checklists) company.checklists = {};
    if (!company.checklists[clStageKey]) company.checklists[clStageKey] = {};
    company.checklists[clStageKey][itemId] = !company.checklists[clStageKey][itemId];
    setData(data);
    refreshClItems();
    renderMonths(getData());
    document.getElementById('summary-area').innerHTML = renderSummary(getData(), getMonths()[1]);
  }

  function toggleCustomItem(itemId) {
    const data = getData();
    const company = data.find(c=>c.id===clCompanyId);
    if (!company||!company.customItems||!company.customItems[clStageKey]) return;
    const item = company.customItems[clStageKey].find(i=>i.id===itemId);
    if (item) item.checked = !item.checked;
    setData(data);
    refreshClItems();
    renderMonths(getData());
    document.getElementById('summary-area').innerHTML = renderSummary(getData(), getMonths()[1]);
  }

  function confirmAddCustomItem() {
    const input = document.getElementById('cl-new-input');
    const text  = input.value.trim();
    if (!text) return;
    const data    = getData();
    const company = data.find(c=>c.id===clCompanyId);
    if (!company) return;
    if (!company.customItems) company.customItems = {};
    if (!company.customItems[clStageKey]) company.customItems[clStageKey] = [];
    company.customItems[clStageKey].push({
      id: 'ci_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5),
      text,
      checked: false,
    });
    setData(data);
    input.value = '';
    refreshClItems();
    renderMonths(getData());
    /* 스크롤 아래로 */
    const scroll = document.getElementById('cl-items');
    scroll.scrollTop = scroll.scrollHeight;
  }

  function deleteTemplateItem(itemId) {
    const data    = getData();
    const company = data.find(c=>c.id===clCompanyId);
    if (!company) return;
    if (!company.deletedItems) company.deletedItems = {};
    if (!company.deletedItems[clStageKey]) company.deletedItems[clStageKey] = [];
    if (!company.deletedItems[clStageKey].includes(itemId))
      company.deletedItems[clStageKey].push(itemId);
    setData(data);
    refreshClItems();
    renderMonths(getData());
    document.getElementById('summary-area').innerHTML = renderSummary(getData(), getMonths()[1]);
  }

  function deleteCustomItem(itemId) {
    const data    = getData();
    const company = data.find(c=>c.id===clCompanyId);
    if (!company||!company.customItems||!company.customItems[clStageKey]) return;
    company.customItems[clStageKey] = company.customItems[clStageKey].filter(i=>i.id!==itemId);
    setData(data);
    refreshClItems();
    renderMonths(getData());
    document.getElementById('summary-area').innerHTML = renderSummary(getData(), getMonths()[1]);
  }

  function closeChecklistModal() {
    document.getElementById('checklist-modal').classList.remove('open');
    clCompanyId = null; clStageKey = null; clType = null;
  }
  function handleClOverlayClick(e) {
    if (e.target===document.getElementById('checklist-modal')) closeChecklistModal();
  }

  /* ─── 메뉴 수정 모달 ─── */
  let editingTemplates = null;
  let activeMenuTab    = 'in';

  function openMenuEdit() {
    editingTemplates = {
      in:  JSON.parse(JSON.stringify(getTemplates('in'))),
      out: JSON.parse(JSON.stringify(getTemplates('out'))),
    };
    editingStaff = JSON.parse(JSON.stringify(getStaff()));
    activeMenuTab = 'in';
    updateTabUI();
    renderMenuEditContent();
    document.getElementById('menu-edit-modal').classList.add('open');
  }

  function switchMenuTab(type) {
    if (activeMenuTab === 'staff') syncStaffInputs(); else syncTemplateInputs();
    activeMenuTab = type;
    updateTabUI();
    renderMenuEditContent();
  }

  function updateTabUI() {
    document.getElementById('tab-in').className    = 'menu-tab in-tab'    + (activeMenuTab==='in'?' active':'');
    document.getElementById('tab-out').className   = 'menu-tab out-tab'   + (activeMenuTab==='out'?' active':'');
    document.getElementById('tab-staff').className = 'menu-tab staff-tab' + (activeMenuTab==='staff'?' active':'');
  }

  function renderMenuEditContent() {
    if (activeMenuTab === 'staff') { renderStaffContent(); return; }
    const stages = getStages(activeMenuTab);
    const tmpl   = editingTemplates[activeMenuTab];
    const isOut  = activeMenuTab==='out';
    const html = stages.map(stage => {
      const items = tmpl[stage.key]||[];
      const rows = items.map((item, idx) => `
        <div class="menu-item-row" draggable="true" data-stage="${stage.key}" data-idx="${idx}">
          <span class="drag-handle" title="드래그하여 순서 변경">⠿</span>
          <input type="text" class="menu-item-input"
            value="${escHtml(item.text)}"
            placeholder="체크리스트 항목 입력"
            oninput="editingTemplates['${activeMenuTab}']['${stage.key}'][${idx}].text=this.value">
          <button class="menu-del-btn" onclick="deleteMenuItem('${stage.key}',${idx})">×</button>
        </div>`).join('');
      return `<div class="menu-stage-section">
        <div class="menu-stage-title${isOut?' out-color':''}">${escHtml(stage.label)}</div>
        <div id="menu-items-${stage.key}">${rows}</div>
        <button class="menu-add-btn" onclick="addMenuItem('${stage.key}')">+ 항목 추가</button>
      </div>`;
    }).join('');
    document.getElementById('menu-edit-content').innerHTML = html;
    setTimeout(initDragDrop, 0);
  }

  function syncTemplateInputs() {
    getStages(activeMenuTab).forEach(s => {
      const section = document.getElementById('menu-items-'+s.key);
      if (!section) return;
      section.querySelectorAll('.menu-item-input').forEach((inp, idx) => {
        const arr = editingTemplates[activeMenuTab][s.key];
        if (arr&&arr[idx]) arr[idx].text = inp.value;
      });
    });
  }

  function deleteMenuItem(stageKey, idx) {
    syncTemplateInputs();
    const arr = editingTemplates[activeMenuTab][stageKey];
    if (arr) arr.splice(idx, 1);
    renderMenuEditContent();
  }

  function addMenuItem(stageKey) {
    syncTemplateInputs();
    const t = activeMenuTab;
    if (!editingTemplates[t][stageKey]) editingTemplates[t][stageKey] = [];
    const newId = (t==='out'?'o':'') + stageKey + '_' + Date.now().toString(36);
    editingTemplates[t][stageKey].push({ id: newId, text: '' });
    renderMenuEditContent();
    setTimeout(() => {
      const section = document.getElementById('menu-items-'+stageKey);
      if (section) {
        const inputs = section.querySelectorAll('.menu-item-input');
        if (inputs.length) inputs[inputs.length-1].focus();
      }
    }, 0);
  }

  function saveMenuEdit() {
    if (activeMenuTab === 'staff') syncStaffInputs(); else syncTemplateInputs();
    ['in','out'].forEach(t => {
      getStages(t).forEach(s => {
        if (editingTemplates[t][s.key]) {
          editingTemplates[t][s.key] = editingTemplates[t][s.key].filter(item=>item.text.trim());
        }
      });
      setTemplates(t, editingTemplates[t]);
    });
    setStaff(editingStaff.filter(s=>s.name.trim()&&s.email.trim()));
    editingTemplates = null;
    editingStaff = null;
    document.getElementById('menu-edit-modal').classList.remove('open');
    render();
  }

  function closeMenuEdit() {
    editingTemplates = null;
    editingStaff = null;
    document.getElementById('menu-edit-modal').classList.remove('open');
  }
  function handleMenuOverlayClick(e) {
    if (e.target===document.getElementById('menu-edit-modal')) closeMenuEdit();
  }

  /* ─── 드래그&드롭 (메뉴 수정) ─── */
  let dragSrcStage = null;
  let dragSrcIdx   = null;

  function initDragDrop() {
    document.querySelectorAll('#menu-edit-content .menu-item-row').forEach(row => {
      row.addEventListener('dragstart', e => {
        dragSrcStage = row.dataset.stage;
        dragSrcIdx   = parseInt(row.dataset.idx);
        e.dataTransfer.effectAllowed = 'move';
        setTimeout(() => row.classList.add('dragging'), 0);
      });
      row.addEventListener('dragend', () => {
        row.classList.remove('dragging');
        document.querySelectorAll('#menu-edit-content .menu-item-row').forEach(r=>r.classList.remove('drag-over'));
      });
      row.addEventListener('dragover', e => {
        e.preventDefault();
        if (row.dataset.stage!==dragSrcStage) return;
        document.querySelectorAll('#menu-edit-content .menu-item-row').forEach(r=>r.classList.remove('drag-over'));
        if (parseInt(row.dataset.idx)!==dragSrcIdx) row.classList.add('drag-over');
      });
      row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
      row.addEventListener('drop', e => {
        e.preventDefault();
        row.classList.remove('drag-over');
        const targetStage = row.dataset.stage;
        const targetIdx   = parseInt(row.dataset.idx);
        if (dragSrcStage!==targetStage||dragSrcIdx===targetIdx) return;
        syncTemplateInputs();
        const items = editingTemplates[activeMenuTab][targetStage];
        const [moved] = items.splice(dragSrcIdx, 1);
        items.splice(targetIdx, 0, moved);
        renderMenuEditContent();
      });
    });
  }

  /* ─── 담당자 관리 ─── */
  function renderStaffContent() {
    const rows = editingStaff.map((s, idx) => `
      <div class="staff-item-row" data-idx="${idx}">
        <input type="text" class="menu-item-input" style="max-width:90px" value="${escHtml(s.name)}" placeholder="이름">
        <input type="text" class="menu-item-input" value="${escHtml(s.email)}" placeholder="이메일">
        <button class="menu-del-btn" onclick="deleteStaffItem(${idx})">×</button>
      </div>`).join('');
    document.getElementById('menu-edit-content').innerHTML = `
      <div class="menu-stage-section">
        <div class="menu-stage-title" style="color:var(--text-muted)">담당자 목록</div>
        <div id="staff-list">${rows||'<div style="color:var(--text-dim);font-size:12px;padding:8px 0;">담당자가 없습니다.</div>'}</div>
        <button class="menu-add-btn" onclick="addStaffItem()">+ 담당자 추가</button>
      </div>`;
  }
  function syncStaffInputs() {
    if (!editingStaff) return;
    const rows = document.querySelectorAll('#staff-list .staff-item-row');
    rows.forEach((row, idx) => {
      if (!editingStaff[idx]) return;
      const inputs = row.querySelectorAll('input');
      if (inputs[0]) editingStaff[idx].name  = inputs[0].value.trim();
      if (inputs[1]) editingStaff[idx].email = inputs[1].value.trim();
    });
  }
  function addStaffItem() {
    syncStaffInputs();
    editingStaff.push({ id:'staff_'+Date.now().toString(36), name:'', email:'' });
    renderStaffContent();
    setTimeout(() => {
      const rows = document.querySelectorAll('#staff-list .staff-item-row');
      if (rows.length) { const inp=rows[rows.length-1].querySelector('input'); if(inp) inp.focus(); }
    }, 0);
  }
  function deleteStaffItem(idx) {
    syncStaffInputs();
    editingStaff.splice(idx, 1);
    renderStaffContent();
  }

  /* ─── 체크리스트 항목 메타 저장 & 팀즈 ─── */
  function saveTemplateItemMeta(itemId, field, value) {
    const data = getData();
    const company = data.find(c=>c.id===clCompanyId);
    if (!company) return;
    if (!company.itemMeta) company.itemMeta = {};
    if (!company.itemMeta[clStageKey]) company.itemMeta[clStageKey] = {};
    if (!company.itemMeta[clStageKey][itemId]) company.itemMeta[clStageKey][itemId] = {};
    company.itemMeta[clStageKey][itemId][field] = value;
    setData(data);
  }
  function saveCustomItemMeta(itemId, field, value) {
    const data = getData();
    const company = data.find(c=>c.id===clCompanyId);
    if (!company||!company.customItems||!company.customItems[clStageKey]) return;
    const item = company.customItems[clStageKey].find(i=>i.id===itemId);
    if (item) { item[field] = value; setData(data); }
  }
  function openTeamsForItem(itemId, itemType) {
    const data = getData();
    const company = data.find(c=>c.id===clCompanyId);
    if (!company) return;
    let text;
    if (itemType==='template') {
      const item = (getCompanyTemplates(company)[clStageKey]||[]).find(i=>i.id===itemId);
      text = item ? item.text : itemId;
    } else {
      const item = ((company.customItems&&company.customItems[clStageKey])||[]).find(i=>i.id===itemId);
      text = item ? item.text : itemId;
    }
    const stage   = getStages(clType).find(s=>s.key===clStageKey);
    const subject = `[STAGE9] ${company.name} - ${text}`;
    const body    = `기업: ${company.name}\n단계: ${stage?stage.label:clStageKey}\n항목: ${text}`;
    let url = `https://outlook.office.com/calendar/action/compose?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    if (company.assigneeId) {
      const person = getStaff().find(s=>s.id===company.assigneeId);
      if (person) url += `&attendees=${encodeURIComponent(person.email)}`;
    }
    window.open(url, '_blank', 'noopener');
  }

  /* ─── 기업 추가/수정 모달 ─── */
  function populateAssigneeSelect(selectedId) {
    const sel = document.getElementById('f-assignee');
    const staff = getStaff();
    sel.innerHTML = `<option value="">선택 안 함</option>` +
      staff.map(s=>`<option value="${escHtml(s.id)}"${selectedId===s.id?' selected':''}>${escHtml(s.name)}</option>`).join('');
  }
  function openModal(type, month) {
    editingId=null;
    document.getElementById('modal-title').textContent='기업 추가';
    document.getElementById('f-name').value='';
    document.getElementById('f-room').value='';
    document.getElementById('f-type').value=type;
    document.getElementById('f-month').value=month;
    document.getElementById('f-memo').value='';
    populateAssigneeSelect('');
    document.getElementById('modal').classList.add('open');
    document.getElementById('f-name').focus();
  }
  function openEdit(id) {
    const c=getData().find(x=>x.id===id);
    if (!c) return;
    editingId=id;
    document.getElementById('modal-title').textContent='기업 수정';
    document.getElementById('f-name').value=c.name;
    document.getElementById('f-room').value=c.room||'';
    document.getElementById('f-type').value=c.isOfficeMove ? 'office_'+c.type : c.type;
    document.getElementById('f-month').value=c.month;
    document.getElementById('f-memo').value=c.memo||'';
    populateAssigneeSelect(c.assigneeId||'');
    document.getElementById('modal').classList.add('open');
  }
  function closeModal() { document.getElementById('modal').classList.remove('open'); editingId=null; }
  function handleOverlayClick(e) { if (e.target===document.getElementById('modal')) closeModal(); }

  function saveCompany() {
    const name        = document.getElementById('f-name').value.trim();
    const room        = document.getElementById('f-room').value.trim();
    const typeVal     = document.getElementById('f-type').value;
    const isOfficeMove = typeVal.startsWith('office_');
    const type        = isOfficeMove ? typeVal.replace('office_', '') : typeVal;
    const month       = document.getElementById('f-month').value;
    const memo        = document.getElementById('f-memo').value.trim();
    const assigneeId  = document.getElementById('f-assignee').value;
    if (!name)  { alert('기업명을 입력해 주세요.'); return; }
    if (!month) { alert('예정 월을 선택해 주세요.'); return; }
    const data=getData();
    if (editingId) {
      const c=data.find(x=>x.id===editingId);
      if (c) {
        Object.assign(c,{name,room,type,month,memo,assigneeId,isOfficeMove});
        if (!c.checklists) c.checklists = initChecklists(type, isOfficeMove);
      }
    } else {
      data.push({id:genId(), name, room, type, month, memo, assigneeId, isOfficeMove, checklists:initChecklists(type, isOfficeMove)});
    }
    setData(data); closeModal(); render();
  }

  function deleteCompany(id) {
    if (!confirm('삭제하시겠습니까?')) return;
    setData(getData().filter(x=>x.id!==id)); render();
  }

  /* Enter키로 항목 추가 */
  /* ─── CSV 내보내기 ─── */
  function exportCSV() {
    const companies = getData();
    if (!companies.length) { alert('내보낼 데이터가 없습니다.'); return; }

    const rows = [];
    rows.push(['기업명', '호실', '구분', '예정월', '단계1', '단계2', '단계3', '단계4', '단계5', '전체진행률', '메모']);

    companies.forEach(c => {
      const type      = c.type||'in';
      const stages    = getStages(type);

      const stageCols = [];
      let totalDone = 0, totalItems = 0;

      stages.forEach(s => {
        const { done, total } = getProgress(c, s.key);
        stageCols.push(total > 0 ? `${s.label} (${done}/${total})` : s.label);
        totalDone  += done;
        totalItems += total;
      });

      while (stageCols.length < 5) stageCols.push('');

      const pct = totalItems > 0 ? Math.round(totalDone/totalItems*100)+'%' : '—';

      rows.push([
        c.name,
        c.room||'',
        c.isOfficeMove ? (type==='in' ? '오피스이전 입주' : '오피스이전 퇴주') : (type==='in' ? '입주' : '퇴주'),
        c.month,
        ...stageCols,
        pct,
        c.memo||'',
      ]);
    });

    const csv = rows.map(r =>
      r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')
    ).join('\n');

    const blob = new Blob(['﻿'+csv], { type:'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    const d = new Date();
    a.download = `STAGE9_입퇴주_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  document.addEventListener('keydown', e => {
    if (e.key==='Escape') { closeModal(); closeChecklistModal(); closeMenuEdit(); }
  });

  document.addEventListener('DOMContentLoaded', () => {
    const ni = document.getElementById('cl-new-input');
    if (ni) ni.addEventListener('keydown', e => {
      if (e.key==='Enter') { e.preventDefault(); confirmAddCustomItem(); }
    });
  });
</script>
